<div class="dashboard-container-topnav">

  <!-- HORIZONTAL TOP NAVIGATION HEADER -->
  <header class="header-nav">
    <div class="header-left">
      <div class="logo-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="logo-icon">
          <line x1="12" y1="1" x2="12" y2="23"></line>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
      </div>
      <span class="brand-name">BoursoTrack</span>

      <nav class="nav-menu">
        <button class="nav-menu-item" [class.active]="activeTab === 'overview'" (click)="activeTab = 'overview'">
          Vue d'ensemble
        </button>
        <button class="nav-menu-item" [class.active]="activeTab === 'transactions'" (click)="activeTab = 'transactions'">
          Relevé de Compte
        </button>
        <button class="nav-menu-item" [class.active]="activeTab === 'goals'" (click)="activeTab = 'goals'">
          Poches d'Épargne
        </button>
        <button class="nav-menu-item" [class.active]="activeTab === 'categories'" (click)="activeTab = 'categories'">
          Catégories
        </button>
      </nav>
    </div>

    <div class="header-right">
      <div class="user-profile">
        <div class="user-avatar">
          {{ currentUser?.username?.substring(0, 2)?.toUpperCase() }}
        </div>
        <span class="user-name">{{ currentUser?.username }}</span>
      </div>

      <button class="btn-logout-header" (click)="logout()" title="Déconnexion sécurisée">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </header>

  <!-- FLUID FULL-WIDTH MAIN CONTENT AREA -->
  <main class="main-content-fluid">
    <div class="content-body">
      @if (activeTab === 'overview') {
        <app-overview (viewChange)="activeTab = $event"></app-overview>
      }

      @if (activeTab === 'transactions') {
        <app-transactions></app-transactions>
      }

      @if (activeTab === 'goals') {
        <app-savings-goals></app-savings-goals>
      }

      @if (activeTab === 'categories') {
        <app-categories></app-categories>
      }
    </div>
  </main>
</div>
