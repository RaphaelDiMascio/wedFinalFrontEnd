<div class="d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm fixed-top py-2">
    <div class="container-fluid px-3 px-lg-4">
      <!-- Brand -->
      <div class="d-flex align-items-center gap-3">
        <div class="logo-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="1" x2="12" y2="23"></line>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
        </div>
        <span class="navbar-brand-text me-3">BoursoTrack</span>
      </div>

      <!-- Navigation Tabs -->
      <ul class="nav nav-pills flex-nowrap overflow-auto mx-auto">
        <li class="nav-item">
          <button class="nav-link" [class.active]="activeTab === 'overview'" (click)="activeTab = 'overview'">
            <i class="bi bi-grid me-1 d-none d-md-inline"></i> Vue d'ensemble
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="activeTab === 'transactions'" (click)="activeTab = 'transactions'">
            <i class="bi bi-receipt me-1 d-none d-md-inline"></i> Relevé de Compte
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="activeTab === 'goals'" (click)="activeTab = 'goals'">
            <i class="bi bi-piggy-bank me-1 d-none d-md-inline"></i> Poches d'Épargne
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="activeTab === 'categories'" (click)="activeTab = 'categories'">
            <i class="bi bi-tags me-1 d-none d-md-inline"></i> Catégories
          </button>
        </li>
      </ul>

      <!-- User section -->
      <div class="d-flex align-items-center gap-3">
        <div class="d-flex align-items-center gap-2">
          <div class="user-avatar">
            {{ currentUser?.username?.substring(0, 2)?.toUpperCase() }}
          </div>
          <span class="fw-bold small d-none d-lg-inline">{{ currentUser?.username }}</span>
        </div>

        <button class="btn btn-sm btn-outline-danger rounded-circle" (click)="logout()" title="Déconnexion sécurisée" style="width: 36px; height: 36px;">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container-lg flex-grow-1" style="margin-top: 80px; padding-top: 1rem; padding-bottom: 2rem;">
    @if (activeTab === 'overview') {
      <app-overview (viewChange)="activeTab = $event"></app-overview>
    }

    @if (activeTab === 'transactions') {
      <app-transactions></app-transactions>
    }

    @if (activeTab === 'goals') {
      <app-savings-goals></app-savings-goals>
    }

    @if (activeTab === 'categories') {
      <app-categories></app-categories>
    }
  </main>
</div>
