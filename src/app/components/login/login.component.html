<div class="auth-container d-flex align-items-center justify-content-center p-3">
  <div class="card shadow-lg border-0" style="max-width: 440px; width: 100%; border-radius: 16px; animation: fadeInUp 0.4s ease-out;">
    <div class="card-body p-4">

      <!-- Header -->
      <div class="text-center mb-4">
        <div class="logo-wrapper logo-lg mx-auto mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"></line>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
        </div>
        <h2 class="fw-bold">{{ isLoginMode ? 'Bienvenue à nouveau' : 'Rejoignez-nous' }}</h2>
        <p class="text-secondary small">{{ isLoginMode ? 'Gérez vos finances personnelles avec élégance.' : 'Commencez à suivre vos revenus, dépenses et épargnes.' }}</p>
      </div>



      <!-- Form -->
      <form (submit)="onSubmit(); $event.preventDefault()">
        <div class="mb-3">
          <label for="username" class="form-label form-label-app">Nom d'utilisateur</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input
              id="username"
              type="text"
              class="form-control"
              name="username"
              placeholder="Ex: jean_dupont"
              [(ngModel)]="username"
              [disabled]="isLoading"
              required
              autocomplete="username"
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label form-label-app">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              id="password"
              type="password"
              class="form-control"
              name="password"
              placeholder="••••••••"
              [(ngModel)]="password"
              [disabled]="isLoading"
              required
              autocomplete="current-password"
            />
          </div>
        </div>

        @if (!isLoginMode) {
          <div class="mb-3">
            <label for="confirmPassword" class="form-label form-label-app">Confirmer le mot de passe</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                id="confirmPassword"
                type="password"
                class="form-control"
                name="confirmPassword"
                placeholder="••••••••"
                [(ngModel)]="confirmPassword"
                [disabled]="isLoading"
                required
                autocomplete="new-password"
              />
            </div>
          </div>
        }

        <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="isLoading">
          @if (isLoading) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            <span>Chargement...</span>
          } @else {
            <span>{{ isLoginMode ? 'Se connecter' : "S'inscrire" }}</span>
          }
        </button>
      </form>

      <!-- Footer -->
      <div class="text-center mt-3">
        <p class="text-secondary small mb-0">
          {{ isLoginMode ? "Vous n'avez pas de compte ?" : "Vous avez déjà un compte ?" }}
          <button type="button" class="btn btn-link btn-sm p-0 ms-1" (click)="toggleMode()" [disabled]="isLoading">
            {{ isLoginMode ? "Créer un compte" : "Se connecter" }}
          </button>
        </p>
      </div>

    </div>
  </div>
</div>
